{% extends "layout.html" %}

{% block title %}{{ title }}{% endblock %}
{% block heading %}{{ title }}{% endblock %}

{% block scripts %}
<style>
	/* Styling for the log box */
	.log-container {
		flex: 1;
		background: #1e1e1e;
		/* Dark "terminal" look */
		color: #dcdcdc;
		padding: 20px;
		border-radius: 12px;
		font-family: 'Courier New', Courier, monospace;
		font-size: 0.95em;
		line-height: 1.4;
		overflow-y: auto;
		/* Scrollbar */
		white-space: pre-wrap;
		/* Keeps line breaks from the txt file */
		box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
	}

	/* Hide the chart toolbar since there is no chart here */
	.toolbar {
		display: none;
	}
</style>

<div class="log-container">
	{{ log_data }}
</div>

<script>
	// We override the layout's global 'chart' variable to null 
	// so the sidebar toggle doesn't try to resize a chart that isn't there.
	chart = null;
</script>
{% endblock %}
