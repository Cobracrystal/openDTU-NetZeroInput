{% extends "layout.html" %}

{% block title %}{{ title }}{% endblock %}
{% block heading %}{{ title }}{% endblock %}

/* Replace the toolbar with nothing (hides the zoom buttons) */
{% block toolbar %}{% endblock %}

{% block content %}
<style>

	.log-container {
		flex: 1;
		background: #1e1e1e;
		color: #dcdcdc;
		padding: 20px;
		border-radius: 12px;
		font-family: 'Courier New', Courier, monospace;
		font-size: 0.95em;
		line-height: 1.4;
		overflow-y: auto;
		white-space: pre-wrap;
		box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
	}

</style>

<div class="log-container">{{ log_data }}</div>
{% endblock %}

{% block scripts %}
<script>
	// Set chart to null so the sidebar toggle doesn't break
	chart = null;
</script>
{% endblock %}
