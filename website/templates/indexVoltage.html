{% extends "layout.html" %}
{% block title %}Solarzellen (Spannung){% endblock %}
{% block heading %}Solarzellen (Spannung){% endblock %}

{% block scripts %}
<script>
	let chartData = [];
	let colMap = {};

	async function fetchMetadata() {
		const response = await fetch('/dashboard/json/solar_metadata.json');
		return await response.json();
	}

	async function fetchData() {
		const response = await fetch('/dashboard/json/solar_voltage.json');
		return await response.json();
	}

	async function fetchDataUpdate() {
		const response = await fetch('/dashboard/json/solar_voltage_update.json');
		return await response.json();
	}

	function appendNewData(newData, colHeaders, mapping) {
		// formatted = [{
		// 			index: 0,
		//			name: "",
		// 			values: [ { x: 0, y: 0}]
		// 		}, ...]
		const TS = 0, VOLTAGES = 1;

		const iterableMapping = Object.entries(mapping)

		for (const d of newData) {
			const x = d[TS] * 1000;
			const voltageArr = d[VOLTAGES];
			let currentSum = 0;
			for (const [inputIndex, arrayPos] of iterableMapping) {
				const y = voltageArr[arrayPos];
				chartData[arrayPos].values.push({ x, y });
			}
		}

		lastTimestamp = newData[newData.length - 1][TS];
		const cutoff = (lastTimestamp - WINDOW_SECONDS) * 1000;

		// purge all values older than 24 hours. shift() is faster than filter. mostly irrelevant but neat

		for (let row of chartData) {
			let series = row.values;
			while (series.length > 0 && series[0].x < cutoff) {
				series.shift();
			}
		}
		if (chartData[0].values.length > 0) {
			firstTimestamp = Math.floor(chartData[0].values[0].x / 1000);
		}
	}

	async function pollUpdates(isInitialLoad = false) {
		const TS = 0;
		const response = isInitialLoad ? await fetchData() : await fetchDataUpdate();

		if (!response.values || response.values.length === 0)
			return;

		// only append points with newer timestamp
		const newPoints = response.values.filter(d => d[TS] > lastTimestamp);

		if (newPoints.length > 0) {
			appendNewData(newPoints, response.columns, response.mapping);
			updateChart(chartData);
		}
	}

	function updateChart(formatted) {
		// formatted = [{
		// 			index: 0,
		//			name: "",
		// 			values: [ { x: 0, y: 0}]
		// 		}, ...]
		for (const plot of formatted) {
			chart.data.datasets[colMap[plot.index]].data = plot.values;
		}

		// update y-axis scaling
		chart.options.scales.y1.suggestedMax = Math.max(
			...formatted.map(d => Math.max(...d.values.map(p => p.y)))
		) * 1.1;
		chart.options.plugins.zoom.limits.x = {
			min: (firstTimestamp - 120) * 1000,
			max: (lastTimestamp + 120) * 1000,
			minRange: 20000
		};
		chart.update();
	}

	async function initChart() {
		const colors = ['blue', 'green', 'cyan', 'lightcoral'];
		const metadata = await fetchMetadata();
		datasetsTemplate = [];
		for (const [idx, col] of metadata.values.entries()) {
			colMap[col[0]] = idx;
			chartData.push({ index: col[0], name: col[1], values: [] });
			datasetsTemplate.push({ label: col[1], data: [], borderColor: colors[idx], fill: false, unit: 'V', yAxisID: 'y1' });
		}
		const ctx = document.getElementById('solarData').getContext('2d');
		chart = new Chart(ctx, {
			type: 'line',
			data: {
				datasets: datasetsTemplate
			},
			options: {
				responsive: true,
				animation: false,	// Required for performance
				parsing: false,		// Required for performance
				maintainAspectRatio: false,
				elements: {
					point: {
						radius: 0, // default radius
						hitRadius: 10, // hitbox for tooltip
						hoverRadius: 4 // hitbox for a data point showing up
					},
					line: {
						borderWidth: 2 // line width
					}
				},
				plugins: {
					decimation: {
						enabled: true,
						algorithm: 'lttb',
						samples: 350,
						threshold: 350
					},
					zoom: {
						zoom: { wheel: { enabled: true, modifierKey: 'shift' }, pinch: { enabled: true }, mode: 'xy', overScaleMode: 'y' },
						pan: { enabled: true, mode: 'xy', overScaleMode: 'y' },
						limits: {
							x: { min: undefined, max: undefined, minRange: 1000 },
							y: { min: undefined, max: undefined }
						}
					},
					tooltip: {
						callbacks: {
							label: ctx => {
								const y = ctx.raw.y ?? ctx.raw;
								const unit = ctx.dataset.unit || '';
								return `${ctx.dataset.label}: ${y} ${unit}`;
							}
						}
					}
				},
				scales: {
					x: {
						title: { display: true, text: 'Zeit' },
						type: 'time',
						ticks: {
							autoSkip: true,
							maxRotation: 0,
							minRotation: 0,
							padding: 10, // gap between labels
							sampleSize: 10, // minimum spacing between ticks
							maxTicksLimit: 10, // max ticks on screen
						}
					},
					y1: {
						position: 'left',
						title: { display: true, text: 'Spannung' }
					}
				}
			}
		});
		await pollUpdates(true)
	}

	initChart().then(() => {
		setInterval(pollUpdates, 5000);
	});
</script>
{% endblock %}
